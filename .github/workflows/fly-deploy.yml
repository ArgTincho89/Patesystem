name: Deploy to Fly.io

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  # ── Configure your PatesiTests repo here ──
  PATESI_TESTS_REPO: ${{ github.repository_owner }}/PatesiTests
  PATESI_TESTS_REF: main

jobs:
  # ════════════════════════════════════════════
  # 1. Unit tests (Jest)
  # ════════════════════════════════════════════
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ════════════════════════════════════════════
  # 2. E2E + API tests (Playwright)
  # ════════════════════════════════════════════
  e2e-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PateSystem
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PateSystem dependencies
        run: npm ci

      - name: Checkout PatesiTests
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PATESI_TESTS_REPO }}
          path: ../PatesiTests
          ref: ${{ env.PATESI_TESTS_REF }}
          token: ${{ secrets.PATESI_TESTS_TOKEN }}

      - name: Install PatesiTests dependencies
        working-directory: ../PatesiTests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ../PatesiTests
        run: npx playwright install --with-deps chromium

      - name: Start PateSystem
        run: |
          npm run dev &
          npx wait-on http://localhost:3000/health --timeout 30000

      - name: Run Playwright tests
        working-directory: ../PatesiTests
        run: npx playwright test --project=setup --project=chromium --project=data-consistency --project=api-tests
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ../PatesiTests/playwright-report/
          retention-days: 14

  # ════════════════════════════════════════════
  # 3. Deploy to Fly.io (only if ALL tests pass)
  # ════════════════════════════════════════════
  deploy:
    needs: [unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        with:
          args: "deploy --remote-only"
